name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Scan git history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml

  test:
    name: Test
    runs-on: ubuntu-latest

    env:
      DB_CONNECTION: pgsql
      DB_HOST: 127.0.0.1
      DB_PORT: 5432
      DB_DATABASE: testing
      DB_USERNAME: nerdik
      DB_PASSWORD: secret

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build PostgreSQL image
        run: docker build -t nerdik-pgsql:ci docker/pgsql

      - name: Start PostgreSQL
        run: |
          docker run -d \
            --name pgsql \
            -e POSTGRES_DB=testing \
            -e POSTGRES_USER=nerdik \
            -e POSTGRES_PASSWORD=secret \
            -p 5432:5432 \
            nerdik-pgsql:ci

          for i in $(seq 1 30); do
            if docker exec pgsql pg_isready -U nerdik -d testing; then
              exit 0
            fi
            sleep 2
          done

          echo "PostgreSQL did not become ready in time." >&2
          docker logs pgsql
          exit 1

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          extensions: bcmath, exif, gd, intl, mbstring, pdo_pgsql, zip
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist --no-interaction

      - name: Prepare application
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Install npm dependencies and build assets
        run: |
          npm ci
          npm run build

      - name: Run migrations
        run: php artisan migrate --force

      - name: Run tests
        run: php artisan test --compact

      - name: Composer audit
        run: composer audit

  compose:
    name: Compose
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare compose env
        run: cp .env.compose.ci .env

      - name: Validate production compose
        run: docker compose -f compose.stack.yaml -f compose.prod.yaml config --quiet

      - name: Validate staging compose
        run: docker compose -f compose.stack.yaml -f compose.staging.yaml config --quiet

  pint:
    name: Pint
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.5"
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@v3
        with:
          composer-options: --prefer-dist --no-interaction

      - name: Check code style
        run: vendor/bin/pint --test
