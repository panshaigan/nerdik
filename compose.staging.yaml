name: nerdik-staging

services:
  app:
    container_name: nerdik-staging-app
    networks:
      - nerdik
      - edge
    depends_on:
      pgsql:
        condition: service_healthy
      mailpit:
        condition: service_started

  reverb:
    container_name: nerdik-staging-reverb
    networks:
      - nerdik
      - edge

  worker:
    deploy:
      resources:
        limits:
          cpus: "0.50"
          memory: 512M
    depends_on:
      pgsql:
        condition: service_healthy
      app:
        condition: service_started
      mailpit:
        condition: service_started

  scheduler:
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 256M

  mailpit:
    image: axllent/mailpit:latest
    container_name: nerdik-staging-mailpit
    restart: unless-stopped
    logging: *default-logging
    environment:
      MP_UI_AUTH: ${MAILPIT_UI_AUTH:?Set MAILPIT_UI_AUTH in .env}
      MP_MAX_MESSAGES: 5000
    expose:
      - "1025"
      - "8025"
    networks:
      - nerdik
      - edge

networks:
  edge:
    external: true
    name: nerdik-edge

volumes:
  storage:
    name: nerdik_staging_storage
    driver: local
  pgsql_data:
    name: nerdik_staging_pgsql_data
    driver: local
