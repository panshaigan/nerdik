name: nerdik-prod

services:
  app:
    container_name: nerdik-prod-app

  reverb:
    container_name: nerdik-prod-reverb

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    logging: *default-logging
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:?Set APP_DOMAIN in .env}
      STAGING_DOMAIN: ${STAGING_DOMAIN:-staging.nerdik.app}
      STAGING_MAILPIT_DOMAIN: ${STAGING_MAILPIT_DOMAIN:-}
      ACME_EMAIL: ${ACME_EMAIL:?Set ACME_EMAIL in .env}
    volumes:
      - ./docker/caddy/entrypoint.sh:/etc/caddy/entrypoint.sh:ro
      - caddy_data:/data
      - caddy_config:/config
    entrypoint: ["/bin/sh", "/etc/caddy/entrypoint.sh"]
    networks:
      - nerdik
      - edge
    depends_on:
      - app
      - reverb

networks:
  edge:
    name: nerdik-edge
    driver: bridge

volumes:
  storage:
    name: nerdik_storage
    driver: local
  pgsql_data:
    name: nerdik_pgsql_data
    driver: local
  caddy_data:
    name: nerdik_caddy_data
    driver: local
  caddy_config:
    name: nerdik_caddy_config
    driver: local
